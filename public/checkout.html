<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Complete your purchase at Apex Electronics. Review your order and enter your payment details.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Electronics — Checkout</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <script type="module" src="assets/scripts/components/header.js" defer></script>
    <script type="text/javascript" src="assets/scripts/components/footer.js" defer></script>
    <script type="module" src="assets/scripts/pages/checkout.js"></script>
</head>
<body>
    <header-component></header-component>
    <main>
        <section class="checkout-wrapper content-gutters">
            <div class="checkout-wrapper__header">
                <h1>Secure Checkout</h1>
            </div>
            <form class="form-card checkout-wrapper__form" novalidate>
                <h2>Billing & Shipping</h2>
                <div class="form-card__row">
                    <div class="input-wrapper">
                        <label for="first-name" class="input-wrapper__label">First Name</label>
                        <input id="first-name" class="input-wrapper__field" type="text" autocomplete="given-name" placeholder="John" required />
                    </div>
                    <div class="input-wrapper">
                        <label for="last-name" class="input-wrapper__label">Last Name</label>
                        <input id="last-name" class="input-wrapper__field" type="text" autocomplete="family-name" placeholder="Doe" required />
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="address-1" class="input-wrapper__label">Street Address</label>
                    <input id="address-1" class="input-wrapper__field" type="text" autocomplete="address-line1" placeholder="Street Address" required />
                </div>
                <div class="input-wrapper">
                    <label for="address-2" class="input-wrapper__label">Address Line 2 (optional)</label>
                    <input id="address-2" class="input-wrapper__field" type="text" autocomplete="address-line2" placeholder="Apartment, suite, etc." />
                </div>
                <div class="form-card__row">
                    <div class="input-wrapper">
                        <label for="city" class="input-wrapper__label">City</label>
                        <input id="city" class="input-wrapper__field" type="text" autocomplete="address-level2" placeholder="Oslo" required />
                    </div>
                    <div class="input-wrapper">
                        <label for="zip-code" class="input-wrapper__label">ZIP Code</label>
                        <input id="zip-code" class="input-wrapper__field" type="text" pattern="[0-9]{4}" autocomplete="postal-code" placeholder="1234" required />
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="phone-number" class="input-wrapper__label">Phone number</label>
                    <input id="phone-number" class="input-wrapper__field" type="tel" minlength="8" maxlength="11" autocomplete="tel" placeholder="+47 000 000 000" required />
                </div>
                <h2>Payment Details</h2>
                <div class="form-card__row__payment-methods">
                    <p>Payment Method</p>
