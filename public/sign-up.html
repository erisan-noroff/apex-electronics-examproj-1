<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Sign up today at Apex Electronics to place orders.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Electronics — Sign Up</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <script type="module" src="assets/scripts/components/header.js" defer></script>
    <script type="text/javascript" src="assets/scripts/components/footer.js" defer></script>
    <script type="module" src="assets/scripts/pages/sign-up.js"></script>
</head>
<body>
    <header-component></header-component>
    <main>
        <div class="signup-wrapper content-gutters">
            <form class="form-card">
                <h1>Sign Up</h1>
                <p>Create your account to get started</p>
                <div class="input-wrapper">
                    <label for="email" class="input-wrapper__label">Email</label>
                    <input id="email" data-validate-domain="true" type="email" autocomplete="email" placeholder="john.doe@stud.noroff.no" required />
                </div>
                <div class="input-wrapper">
                    <label for="password" class="input-wrapper__label">Password</label>
                    <input id="password" type="password" autocomplete="password" placeholder="Password" required />
                </div>
                <div class="input-wrapper">
                    <label for="confirm-password" class="input-wrapper__label">Confirm Password</label>
                    <input id="confirm-password" type="password" autocomplete="password" placeholder="Re-enter your password" required />
                </div>
                <div class="form-card__row">
                    <div class="input-wrapper">
                        <label for="first-name" class="input-wrapper__label">First Name</label>
                        <input id="first-name" type="text" autocomplete="given-name" placeholder="John" required />
                    </div>
                    <div class="input-wrapper">
                        <label for="last-name" class="input-wrapper__label">Last Name</label>
                        <input id="last-name" type="text" autocomplete="family-name" placeholder="Doe" required />
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="address-1" class="input-wrapper__label">Street Address</label>
                    <input id="address-1" type="text" autocomplete="address-line1" placeholder="Street Address" required />
                </div>
                <div class="input-wrapper">
                    <label for="address-2" class="input-wrapper__label">Address Line 2 (optional)</label>
                    <input id="address-2" type="text" autocomplete="address-line2" placeholder="Apartment, suite, etc." />
                </div>
                <div class="form-card__row">
                    <div class="input-wrapper">
                        <label for="city" class="input-wrapper__label">City</label>
                        <input id="city" type="text" autocomplete="given-name" placeholder="Oslo" required />
                    </div>
                    <div class="input-wrapper">
                        <label for="zip-code" class="input-wrapper__label">ZIP Code</label>
                        <input id="zip-code" type="text" pattern="[0-9]{4}" autocomplete="postal-code" placeholder="1234" required />
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="phone-number" class="input-wrapper__label">Phone number</label>
                    <input id="phone-number" type="tel" minlength="8" maxlength="11" autocomplete="tel" placeholder="+47 000 000 000" required />
                </div>
            </form>
        </div>
    </main>
    <footer-component></footer-component>
</body>
</html>
